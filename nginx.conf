events {
   worker_connections 4096;
   use epoll;
   multi_accept on;
}

http {
   server {
      listen 80;

      server_name gekuio.ru;

      location /api/ {
         rewrite ^/api(.*)$ $1 break;
         proxy_pass http://backend:3001/;
      }

      location / {
         proxy_pass http://frontend:3000/;
      }
   }
}